name: LIORA CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Ruff check
        run: ruff check src --ignore E501 || true

      - name: Unit tests
        run: pytest tests/ -v --tb=short
        env:
          PYTHONPATH: src

  docker-api:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f src/liora/api/Dockerfile -t liora-api:test .
