services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: liora_satisfaction
      POSTGRES_USER: liora
      POSTGRES_PASSWORD: liora_secret
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liora -d liora_satisfaction"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: liora
      MONGO_INITDB_ROOT_PASSWORD: liora_secret
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      - elasticsearch

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow

  api:
    build:
      context: .
      dockerfile: src/liora/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATA_DIR: /app/data
      MLFLOW_TRACKING_URI: http://mlflow:5000
      POSTGRES_HOST: postgres
      MONGO_URI: mongodb://liora:liora_secret@mongodb:27017
      ELASTICSEARCH_URL: http://elasticsearch:9200
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started

  scraper:
    build:
      context: .
      dockerfile: docker/Dockerfile.scraper
    environment:
      DATA_DIR: /app/data
      MAX_REVIEWS_PER_COMPANY: 100
      SCRAPER_HEADLESS: "true"
    volumes:
      - ./data:/app/data
    profiles:
      - scrape

  airflow:
    image: apache/airflow:2.8.1-python3.11
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://liora:liora_secret@postgres:5432/liora_satisfaction
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      _PIP_ADDITIONAL_REQUIREMENTS: pandas playwright psycopg2-binary pymongo elasticsearch mlflow scikit-learn pyyaml python-dotenv
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./config:/opt/airflow/config
      - ./data:/opt/airflow/data
    ports:
      - "8080:8080"
    command: >
      bash -c "airflow db migrate && airflow users create --username admin --password admin
      --firstname Admin --lastname User --role Admin --email admin@liora.local || true
      && airflow webserver & airflow scheduler"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - airflow

volumes:
  pg_data:
  mongo_data:
  es_data:
  mlflow_data:
